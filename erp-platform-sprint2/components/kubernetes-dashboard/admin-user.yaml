apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${DASHBOARD_ADMIN_SA}
  namespace: ${DASHBOARD_NAMESPACE}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ${DASHBOARD_ADMIN_SA}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: ${DASHBOARD_ADMIN_SA}
    namespace: ${DASHBOARD_NAMESPACE}
